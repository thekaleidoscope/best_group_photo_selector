# heic = [
#     "pillow-heif>=0.13.0",
# ]

# Uncomment to enable CLIP aesthetic scoring (GPU optional):
# clip = [
#     "open-clip-torch>=2.20.0",
#     "torch>=2.0.0",
#     "torchvision>=0.15.0",
# ]

[dependency-groups]
dev = []
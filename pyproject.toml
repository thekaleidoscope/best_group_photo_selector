[project]
name = "best-group-photo-selector"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pillow>=10.0.0",
    "opencv-python-headless>=4.8.0",
    "imagehash>=4.3.1",
    "exifread>=3.0.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "tqdm>=4.65.0",
    "mediapipe>=0.10.0",
    "insightface>=0.7.3",
    "onnxruntime>=1.16.0",
]

[project.optional-dependencies]
